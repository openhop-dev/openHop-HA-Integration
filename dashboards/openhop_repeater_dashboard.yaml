# openHop Repeater dashboard view template
#
# QUICK SETUP
# 1. In Home Assistant, find one entity for your Repeater, such as:
#      sensor.my_repeater_repeater_version
# 2. The part before `_repeater_version` is your entity prefix (`my_repeater`).
# 3. Find and replace every `REPEATER_SLUG` below with that prefix.
# 4. Optionally change the title and path below.
#
# Dynamic MQTT broker, companion, and external-sensor entities vary by install.
# Replace the clearly marked example broker/companion rows with entities that
# exist in your instance. If your external sensor is not named `modem`, replace
# `_sensor_modem_` in those rows with the actual sensor slug shown by HA.
#
# This template uses only built-in Home Assistant cards.

title: Example openHop Repeater
path: example-openhop-repeater
icon: mdi:radio-tower
type: masonry
badges:
  - entity: binary_sensor.REPEATER_SLUG_mqtt_broker_connected
    name: MQTT
  - entity: binary_sensor.REPEATER_SLUG_mqtt_handler_active
    name: MQTT Handler
  - entity: binary_sensor.REPEATER_SLUG_gps_fix_valid
    name: GPS Fix
  - entity: binary_sensor.REPEATER_SLUG_update_available
    name: Update
  - entity: sensor.REPEATER_SLUG_repeater_version
    name: Version
  - entity: select.REPEATER_SLUG_repeater_mode
    name: Mode

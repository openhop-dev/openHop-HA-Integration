      - type: entity
        entity: sensor.REPEATER_SLUG_average_score_24h
        name: Avg Score 24h
        icon: mdi:signal

  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.REPEATER_SLUG_current_airtime
        name: Airtime
        min: 0
        max: 100
        severity:
          green: 0
          yellow: 50
          red: 80
      - type: gauge
        entity: sensor.REPEATER_SLUG_radio_utilization
        name: Radio Use
        min: 0
        max: 100
        severity:
